# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

source: .
destination: ./_site
permalink: /blog/:year/:title/
exclude:
  - bin/
  - CONTRIBUTING.md
  - DEPLOY.md
  - docker-compose.yml
  - docker-compose-slim.yml
  - Dockerfile
  - Dockerfile-slim
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - vendor

# Sass settings
sass:
  style: compressed

# Plugin settings
plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Theme (green — see assets/css/custom_theme.css for color overrides)
# -----------------------------------------------------------------------------

# Optionally set a custom URL when deploying
url: https://tokitahmid64.github.io  # or your custom domain e.g. https://tokitahmid.com
baseurl:                              # leave empty if site is at root

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Tahmid]
  first_name: [Md Toki, Md. Toki, MT]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# Optional features
# -----------------------------------------------------------------------------

enable_google_analytics: false
enable_cronitor_analytics: false
enable_google_verification: false
enable_bing_verification: false
enable_masonry: true
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Notes
blog_nav_title: Blog
blog_description: Occasional thoughts on research, ML, and computational biology
pagination:
  enabled: true
  collection: posts
  permalink: /page/:num/
  per_page: 5
  sort_field: date
  sort_reverse: true
  trail:
    before: 1
    after: 3

# -----------------------------------------------------------------------------
# Collections defaults
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: assets/img/
    values:
      image: true
  - scope:
      path: _pages
      type: pages
    values:
      layout: page
  - scope:
      path: _posts
      type: posts
    values:
      layout: post
      seo:
        date_modified: true
